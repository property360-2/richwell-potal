name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: richwell_portal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    # -----------------------------
    # Backend Setup
    # -----------------------------
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Database Migrations & Seed Setup
      working-directory: ./backend
      env:
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: richwell_portal
        DJANGO_SETTINGS_MODULE: config.settings.development
        SECRET_KEY: testing-secret-key-123
      run: |
        python manage.py migrate
        python manage.py create_admin
        # Generate CSRF for tests
        python manage.py runserver 8000 &

    - name: Run Backend Unit/Integration Tests
      working-directory: ./backend
      env:
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: richwell_portal
        DJANGO_SETTINGS_MODULE: config.settings.test
        SECRET_KEY: testing-secret-key-123
      run: |
        pip install -r requirements-test.txt
        pytest --tb=short -q
        
    # -----------------------------
    # Frontend Setup
    # -----------------------------
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json
        
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps chromium

    - name: Run Playwright tests
      working-directory: ./frontend
      env:
        # Prevent Playwright from spawning its own dev server if it conflicts,
        # but since playwright.config.js spins up npm run dev, we let it do so.
        VITE_API_URL: http://localhost:8000/api/
      run: npm run test:e2e

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
